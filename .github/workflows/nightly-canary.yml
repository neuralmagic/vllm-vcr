name: Nightly Canary

# Early warning on vLLM protocol drift. The `nightly` compat.toml line is pinned
# and only moves when someone bumps it; this job tracks the LIVE upstream main
# HEAD instead. It pins the protocol crate to that sha, builds + unit-tests, and
# publishes a rolling `nightly` prerelease with the sha in its notes. A red run
# = upstream moved the engine-core protocol out from under us (notify-only: this
# isn't a PR gate, it can't be, it tracks a moving target we don't control).
# Daily drift check + prerelease; the rev bump is weekly, not daily (the daily runs
# still track live HEAD, they just don't touch source). Two disjoint-weekday crons
# keep it to one run per day.
on:
  schedule:
    - cron: "0 6 * * 0,2-6" # Sun, Tue-Sat: drift check + prerelease only
    - cron: "0 6 * * 1" # Mon: also open the rev-bump PR
  workflow_dispatch:

concurrency:
  group: nightly-canary
  cancel-in-progress: false

permissions:
  contents: write # refresh the rolling `nightly` prerelease
  pull-requests: write # open/update the auto-bump PR

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # Harden cargo against flaky crates.io fetches. HTTP/2 multiplexing is what
  # throws the intermittent "curl [16] Error in the HTTP2 framing layer" during
  # crate downloads; force HTTP/1.1 to dodge that class entirely, and retry the
  # other transient blips.
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  # build.rs treats a non-vX.Y tag as the newest line (all capability cfgs on).
  VLLM_TARGET_VERSION: nightly

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      # Guards the auto-bump steps. Until the GitHub App secrets are provisioned,
      # CANARY_APP_ID is empty and the bump steps skip, so the canary still runs
      # its drift check + rolling prerelease unchanged.
      CANARY_APP_ID: ${{ secrets.CANARY_APP_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Resolve vLLM main HEAD
        id: head
        run: |
          sha=$(git ls-remote https://github.com/vllm-project/vllm.git HEAD | cut -f1)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "vLLM main HEAD: ${sha}"

      - name: Pin protocol crate to upstream HEAD
        run: cargo xtask pin-vllm nightly --rev "${{ steps.head.outputs.sha }}"

      # The early-warning signal: build + behavioral unit tests against HEAD. A
      # failure here is the protocol-drift alert. Omit --locked: the pin moved the
      # rev off Cargo.lock.
      - name: Build + unit test against HEAD
        run: |
          cargo build --workspace
          cargo test --workspace --lib

      - name: Package standalone binary
        run: |
          set -euo pipefail
          target=x86_64-unknown-linux-musl
          cargo build --release --target "$target" -p vllm-vcr
          name="vllm-vcr-nightly-${target}"
          mkdir -p dist staging
          bindir="target/${target}/release"
          cp "$bindir/vllm-vcr" staging/
          tar -C staging -czf "dist/${name}.tar.gz" vllm-vcr
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      # Rolling prerelease: one `nightly` tag/release, force-moved to today's main
      # and rebuilt against the resolved vLLM sha (recorded in the notes).
      - name: Refresh rolling `nightly` prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.head.outputs.sha }}
        run: |
          set -euo pipefail
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "nightly (vLLM main @ ${SHA:0:12})" \
            --notes "Rolling build against vLLM main commit \`${SHA}\`, overwritten each night. Not a stable release; tracks upstream HEAD to surface protocol drift early."
          gh release upload nightly dist/* --clobber

      # --- Auto-bump compat.toml's nightly protocol_rev (weekly / on-demand) ------
      # Monday + manual dispatch only, after the green build+test (so the PR proposes
      # a sha that already builds). Skips until the App secrets exist; the App token
      # is what lets the bump PR trigger CI (the default GITHUB_TOKEN can't).
      - name: Mint App token for the bump PR
        id: app-token
        if: ${{ env.CANARY_APP_ID != '' && (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1') }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CANARY_APP_ID }}
          private-key: ${{ secrets.CANARY_APP_PRIVATE_KEY }}

      - name: Bump nightly protocol_rev in compat.toml
        if: ${{ env.CANARY_APP_ID != '' && (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1') }}
        run: cargo xtask set-nightly-rev "${{ steps.head.outputs.sha }}"

      # add-paths keeps the PR to compat.toml only; the pin-vllm step above also
      # edited Cargo.toml, but that pin is derived (CI regenerates it from
      # compat.toml on merge), not part of the source-of-truth bump. No diff -> the
      # action opens no PR, so a HEAD that already matches is a clean no-op.
      - name: Open/update the auto-bump PR
        if: ${{ env.CANARY_APP_ID != '' && (github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * 1') }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          add-paths: compat.toml
          base: main
          branch: auto/nightly-rev-bump
          delete-branch: true
          commit-message: "ci: bump nightly protocol_rev to vLLM main ${{ steps.head.outputs.sha }}"
          title: "ci: bump nightly protocol_rev to latest vLLM main"
          body: |
            Automated by the nightly canary.

            vLLM main HEAD [`${{ steps.head.outputs.sha }}`](https://github.com/vllm-project/vllm/commit/${{ steps.head.outputs.sha }})
            built and passed unit tests against the `nightly` line, so this bumps
            `compat.toml`'s nightly `protocol_rev` to it.

            On merge, CI re-derives `Cargo.toml` from `compat.toml`
            (`cargo xtask pin-vllm nightly`). Review the build + conformance results
            before merging.
