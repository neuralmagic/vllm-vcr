name: Docs

# Build the mdBook doc site and deploy it to GitHub Pages. Runs on pushes to main
# that touch the book (so doc edits ship without a release), and on manual dispatch.
# PRs build the book as a check but do not deploy.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege: Pages deploy needs pages: write + id-token: write; the build-only
# PR path needs neither but inherits read.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.4.52"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install mdBook
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: mdbook@${{ env.MDBOOK_VERSION }}
      - name: Build
        run: mdbook build
      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: book

  # Deploy only from main / dispatch; PRs stop after the build check above.
  # mdBook output uses relative asset paths, so it serves correctly under the
  # /vllm-vcr/ Pages subpath without a configure-pages base-URL injection.
  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
