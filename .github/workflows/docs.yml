name: Docs

# Build the mdBook doc site and deploy it to GitHub Pages. Runs on pushes to main
# that touch the book (so doc edits ship without a release), and on manual dispatch.
# PRs build the book as a check but do not deploy.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege: Pages deploy needs pages: write + id-token: write; the build-only
# PR path needs neither but inherits read.
permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.4.52"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the sticky docs-preview comment on PRs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install mdBook
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: mdbook@${{ env.MDBOOK_VERSION }}
      - name: Build
        run: mdbook build
      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: book

      # PR preview: attach this PR's rendered book and link it from a sticky comment,
      # so reviewers can grab the exact build without digging through the run's
      # artifacts list. (GitHub Pages serves one site per repo, so there's no native
      # per-PR live URL; the artifact is the GitHub-native preview.)
      - name: Upload PR preview artifact
        id: preview
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-preview
          path: book
      - name: Comment the preview link
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: docs-preview
          message: |
            📖 **Docs preview** for this PR is built and attached as the `docs-preview` artifact.

            **[⬇️ Download `docs-preview`](${{ steps.preview.outputs.artifact-url }})**, unzip, and open `index.html` in a browser.

            _Rebuilt for ${{ github.event.pull_request.head.sha }}._

  # Deploy only from main / dispatch; PRs stop after the build check above.
  # mdBook output uses relative asset paths, so it serves correctly under the
  # /vllm-vcr/ Pages subpath without a configure-pages base-URL injection.
  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
