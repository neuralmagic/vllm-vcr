name: Release

# Publish the standalone `vllm-vcr` binary (record/play/inspect) as GitHub Release
# assets, one per supported vLLM line x platform. These are the lightweight path for
# users who just want to replay a trace, run the mock engine, or run the tap to
# capture, without pulling the multi-GB container (which carries UCX + libnixl + vllm-rs
# for the full P/D + capture topology). The binary is pure Rust (no NIXL in the default
# build, the `zeromq` crate is pure Rust), so it builds static (musl) on Linux.
#
# Per-line because the wire protocol (vllm-engine-core-client rev) is compiled in:
# `vllm-vcr record`/`play` bake the protocol, and the handshake guard aborts loudly if
# a binary meets a peer on a different line. `vllm-vcr inspect` (offline trace tooling:
# convert/calibrate/summarize/perfetto) never handshakes an external peer, so the
# default-line binary doubles as the line-agnostic inspect tool and is also published
# unsuffixed once per platform. Tag a release (v*) to publish; workflow_dispatch builds
# everything as a smoke test without uploading.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never interrupt an in-progress release upload

permissions:
  contents: write # create the release + upload assets

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Cross compat.toml lines with the target platforms into one matrix: a build per
  # (line, platform). Mirrors ci.yml's compat-matrix but emits the platform fan-out too.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.parse.outputs.include }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      # `cargo xtask release-matrix` crosses every compat.toml line with the
      # native-arch release platforms (defined in xtask). The default line also
      # publishes the line-agnostic trace tooling.
      - name: Build the line x platform matrix
        id: parse
        run: echo "include=$(cargo xtask release-matrix)" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.runner }}
    env:
      # Stamp the line so build.rs emits the right capability cfgs + advertised version
      # (a non-vX.Y tag like "nightly" is treated as newest).
      VLLM_TARGET_VERSION: ${{ matrix.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}

      # musl-tools provides the musl linker for the static Linux builds. (No-op on macOS.)
      - name: Install musl toolchain (Linux)
        if: ${{ matrix.os == 'linux' }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Pin Cargo.toml to this line's rev + fork patch (see cargo xtask pin-vllm). The rev
      # then no longer matches Cargo.lock, so the build omits --locked.
      - name: Pin vLLM rev (line ${{ matrix.line }})
        run: cargo xtask pin-vllm "${{ matrix.line }}"

      # Default features only: no NIXL, so this stays a small pure-Rust binary.
      - name: Build vllm-vcr (${{ matrix.target }})
        run: cargo build --release --target "${{ matrix.target }}" -p vllm-vcr

      - name: Package
        id: pkg
        run: |
          set -euo pipefail
          name="vllm-vcr-vllm${{ matrix.line }}-${{ matrix.target }}"
          mkdir -p dist staging
          bindir="target/${{ matrix.target }}/release"
          cp "$bindir/vllm-vcr" staging/
          tar -C staging -czf "dist/${name}.tar.gz" vllm-vcr
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          ls -la dist/

      # `vllm-vcr inspect` is line-agnostic (no external handshake), so the default
      # line's binary doubles as the general inspect tool and ships once per platform
      # under an unsuffixed name. It is the same binary already built above; only the
      # default-line jobs package + upload it, so the per-platform asset isn't rebuilt
      # and clobbered N times across the lines.
      - name: Package line-agnostic inspect binary (default line only)
        if: ${{ matrix.default }}
        run: |
          set -euo pipefail
          name="vllm-vcr-${{ matrix.target }}"
          mkdir -p dist staging-inspect
          bindir="target/${{ matrix.target }}/release"
          cp "$bindir/vllm-vcr" staging-inspect/
          tar -C staging-inspect -czf "dist/${name}.tar.gz" vllm-vcr
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          ls -la dist/

      # On a tag: publish to the release. On workflow_dispatch: smoke only (the build
      # above is the test). `gh release create || true` is idempotent across the matrix.
      - name: Upload to release
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" --generate-notes --verify-tag 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" dist/* --clobber
