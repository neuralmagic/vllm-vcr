# Kueue queue: one conformance capture Job at a time (gpu-h200 nominalQuota: 1).
# Apply once before validation Jobs. Upload path: docs/conformance.md.
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: conformance-queue
  labels:
    llm-d.ai/rig: conformance-queue
spec:
  namespaceSelector: {} # any namespace whose LocalQueue points here
  queueingStrategy: BestEffortFIFO
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: gpu-h200 # reuse the existing ResourceFlavor (H200 nodes)
          resources:
            - { name: cpu, nominalQuota: "24" }
            - { name: memory, nominalQuota: 96Gi }
            - { name: nvidia.com/gpu, nominalQuota: "1" } # the serializer: one at a time
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: conformance-queue
  namespace: inference-sim
  labels:
    llm-d.ai/rig: conformance-queue
spec:
  clusterQueue: conformance-queue
