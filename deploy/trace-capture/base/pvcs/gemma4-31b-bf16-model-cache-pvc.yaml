# RWX weight cache for gemma-4-31B-it bf16 (~61 GB).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gemma4-31b-bf16-model-cache
  labels:
    llm-d.ai/rig: gemma4-31b-bf16
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: shared-vast
  resources:
    requests:
      storage: 100Gi
