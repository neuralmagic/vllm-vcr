# H200 trace capture: loadgen → vllm-rs :5570 → tap → headless vLLM :5580 → /trace
# Pin: engine image must match Cargo.toml protocol_rev (c9340e6f3).
# Ops: if any container restarts, delete the pod; fetch trace before scale-down (emptyDir).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-capture-h200
  labels:
    llm-d.ai/guide: trace-capture
    llm-d.ai/model: Qwen3-8B
    llm-d.ai/rig: h200
spec:
  replicas: 1 # scale to 0 when not capturing; re-apply resets scale
  selector:
    matchLabels:
      llm-d.ai/guide: trace-capture
  strategy:
    type: Recreate # never two pods fighting over the GPU
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture
        llm-d.ai/model: Qwen3-8B
    spec:
      containers:
        # --- Real engine: headless vLLM at the protocol-pinned commit -------------------
        - name: engine
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:c9340e6f350a009cf835878abad2a0e379b9e6a4
          command: ["vllm", "serve"]
          args:
            - Qwen/Qwen3-8B
            - --headless
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5580
            - --data-parallel-size=1
            - --tensor-parallel-size=1
            - --gpu-memory-utilization=0.90
            - --max-model-len=16384
            - --enforce-eager
            # ngram speculative decoding: zero extra weights, ungated, works
            # under eager. Acceptance varies 1..K per step, so the engine emits
            # genuine multi-token output chunks and per-step spec_decoding_stats
            # (captured by the tap's --step-stats-out sidecar below). The point
            # is exercising the multi-token-step + scheduler-stats path, not
            # acceptance fidelity.
            - '--speculative-config={"method":"ngram","num_speculative_tokens":4,"prompt_lookup_max":4,"prompt_lookup_min":2}'
          # No HF_TOKEN on purpose: Qwen3-8B is ungated and anonymous pulls run at
          # full CDN speed from this cluster, while the namespace's hf-token-secret
          # holds an expired token that turns every hub request into a 401.
          #
          # Xet must stay off: hf-xet's chunked protocol crawls at ~20MB/min through
          # this cluster's egress (istio sidecar), while plain HTTP does ~350MB/s.
          env:
            - { name: HF_HUB_CACHE, value: /models }
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: VLLM_RPC_TIMEOUT, value: "7200000" }
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 96Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache, name: torch-compile-cache }
            - { mountPath: /.triton, name: triton-cache }
            - { mountPath: /.config, name: vllm-config }
            - { mountPath: /models, name: model-cache }
        # --- Recording tap ---------------------------------------------------------------
        - name: tap
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v8
          command: ["/usr/local/bin/vllm-vcr", "record"]
          # Handshake/data addresses use the binary's defaults (frontend
          # :5570, engine :5580, data :29560/:29561), matching the frontend
          # and engine args below.
          args:
            - --trace-out=/trace/trace.jsonl
            - --model=Qwen/Qwen3-8B
            - --gpu=H200
            - --tp=1
            # Content capture: records output_token_ids per request. The trace
            # then carries user/model content - handle accordingly.
            - --record-tokens
            # Per-step SchedulerStats sidecar: with spec decode on, every
            # token-step's spec_decoding_stats (per-position acceptance) lands
            # here, the ground truth the sim's emitted spec stats are gated
            # against.
            - --step-stats-out=/trace/step-stats.jsonl
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        # --- Rust frontend: OpenAI server, no local engine --------------------------------
        - name: frontend
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v8
          command: ["/usr/local/bin/vllm-rs", "serve"]
          args:
            - Qwen/Qwen3-8B
            - --data-parallel-size=1
            - --data-parallel-size-local=0
            - --handshake-port=5570
            - --host=0.0.0.0
            - --port=8000
          env:
            # Engine startup includes the HF weight download; give the frontend
            # plenty of patience before it gives up on registration.
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }
          ports:
            - { name: modelserver, containerPort: 8000, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/models, port: modelserver }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: { cpu: "4", memory: 8Gi }
            limits: { cpu: "8", memory: 16Gi }
      volumes:
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: model-cache
          emptyDir: { sizeLimit: 100Gi }
        - name: trace
          emptyDir: {}
