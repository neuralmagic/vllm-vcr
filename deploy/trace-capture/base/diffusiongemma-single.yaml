# DiffusionGemma counterfactual: single vllm serve container (no tap, no headless split).
# Isolates whether image-in works without the disaggregated rig.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-capture-dg-single
  labels:
    llm-d.ai/guide: trace-capture-dg-single
    llm-d.ai/model: diffusiongemma-26B-A4B
    llm-d.ai/rig: diffusiongemma-single
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/guide: trace-capture-dg-single
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture-dg-single
        llm-d.ai/model: diffusiongemma-26B-A4B
    spec:
      containers:
        - name: server
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
          command: ["vllm", "serve"]
          args:
            - RedHatAI/diffusiongemma-26B-A4B-it-FP8-dynamic
            - --host=0.0.0.0
            - --port=8000
            - --tensor-parallel-size=1
            - --trust-remote-code
            - --gpu-memory-utilization=0.85
            - --max-model-len=16384
            - --max-num-seqs=4
            - --enforce-eager
            - --generation-config=vllm
            - '--diffusion-config={"canvas_length": 256}'
            - '--limit-mm-per-prompt={"image": 7}'
            - '--mm-processor-kwargs={"max_soft_tokens": 1120}'
            - '--hf-overrides={"diffusion_sampler":"entropy_bound","diffusion_entropy_bound":0.1}'
            - '--default-chat-template-kwargs={"enable_thinking":true}'
          env:
            - { name: VLLM_USE_V2_MODEL_RUNNER, value: "1" }
            - { name: HF_HUB_CACHE, value: /models }
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: VLLM_LOGGING_LEVEL, value: "DEBUG" }
          ports:
            - { name: modelserver, containerPort: 8000, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/models, port: modelserver }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 96Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache, name: torch-compile-cache }
            - { mountPath: /.triton, name: triton-cache }
            - { mountPath: /.config, name: vllm-config }
            - { mountPath: /models, name: model-cache }
      volumes:
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: model-cache
          persistentVolumeClaim:
            claimName: dg-model-cache
