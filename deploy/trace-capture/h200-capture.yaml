# Real-engine latency trace capture: the recording tap sits between the vLLM Rust
# frontend and a real headless vLLM engine, all over in-pod localhost TCP, so the
# recorded TTFT/per-token ITL gaps carry no network jitter.
#
#   guidellm (port-forward :8000)
#       | HTTP
#   frontend   vllm-rs serve --data-parallel-size-local 0   binds handshake :5570
#       | ZMQ
#   tap        inference-sim-tap                            :5570 <-> :5580, trace -> /trace
#       | ZMQ
#   engine     vllm serve --headless                        connects handshake :5580, 1x GPU
#
# Version pinning is load-bearing: the engine image is the vLLM postmerge CI build for
# EXACTLY the commit our protocol structs are pinned to (ba94a3b, see Cargo.toml). The
# msgspec data-path structs are positional (array_like), so a version-skewed engine
# (e.g. llm-d-cuda v0.7.0 = vLLM v0.19.1) misdecodes against this frontend/tap.
#
# Model: Qwen3-8B at TP=1 (proof of concept; ungated, so no HF token needed, and small
# enough that a plain HF download beats wiring up modelexpress).
#
# Operational notes:
#   - The three containers handshake exactly once, in order (tap binds :5580, engine
#     connects, then tap dials the frontend). If ANY container restarts, delete the pod;
#     a half-rewired pod records garbage.
#   - Fetch the trace live or after the run:
#       kubectl exec -n weaton-dev deploy/trace-capture-h200 -c tap -- cat /trace/trace.jsonl > trace.jsonl
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-capture-h200
  namespace: weaton-dev
  labels:
    llm-d.ai/guide: trace-capture
    llm-d.ai/model: Qwen3-8B
spec:
  replicas: 1 # scale to 0 when not capturing (and remember: re-applying resets scale)
  selector:
    matchLabels:
      llm-d.ai/guide: trace-capture
  strategy:
    type: Recreate # never two pods fighting over the GPU
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture
        llm-d.ai/model: Qwen3-8B
    spec:
      serviceAccountName: modelexpress-p2p-nvidia-gpu-vllm-sa
      containers:
        # --- Real engine: headless vLLM at the protocol-pinned commit -------------------
        - name: engine
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:ba94a3b9989666f950e1f784d18f2033c63c6cad
          command: ["vllm", "serve"]
          args:
            - Qwen/Qwen3-8B
            - --headless
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5580
            - --data-parallel-size=1
            - --tensor-parallel-size=1
            - --gpu-memory-utilization=0.90
            - --max-model-len=16384
            - --enforce-eager
          # No HF_TOKEN on purpose: Qwen3-8B is ungated and anonymous pulls run at
          # full CDN speed from this cluster, while the namespace's hf-token-secret
          # holds an expired token that turns every hub request into a 401.
          #
          # Xet must stay off: hf-xet's chunked protocol crawls at ~20MB/min through
          # this cluster's egress (istio sidecar), while plain HTTP does ~350MB/s.
          env:
            - { name: HF_HUB_CACHE, value: /models }
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: VLLM_RPC_TIMEOUT, value: "7200000" }
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 96Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache, name: torch-compile-cache }
            - { mountPath: /.triton, name: triton-cache }
            - { mountPath: /.config, name: vllm-config }
            - { mountPath: /models, name: model-cache }
        # --- Recording tap ---------------------------------------------------------------
        - name: tap
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v3
          command: ["/usr/local/bin/inference-sim-tap"]
          args:
            - --frontend-handshake=tcp://127.0.0.1:5570
            - --engine-handshake=tcp://127.0.0.1:5580
            - --input-address=tcp://127.0.0.1:29560
            - --output-address=tcp://127.0.0.1:29561
            - --trace-out=/trace/trace.jsonl
            - --model=Qwen/Qwen3-8B
            - --gpu=H200
            - --tp=1
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        # --- Rust frontend: OpenAI server, no local engine --------------------------------
        - name: frontend
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v3
          command: ["/usr/local/bin/vllm-rs", "serve"]
          args:
            - Qwen/Qwen3-8B
            - --data-parallel-size=1
            - --data-parallel-size-local=0
            - --handshake-port=5570
            - --host=0.0.0.0
            - --port=8000
          env:
            # Engine startup includes the HF weight download; give the frontend
            # plenty of patience before it gives up on registration.
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }
          ports:
            - { name: modelserver, containerPort: 8000, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/models, port: modelserver }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: { cpu: "4", memory: 8Gi }
            limits: { cpu: "8", memory: 16Gi }
      volumes:
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: model-cache
          emptyDir: { sizeLimit: 100Gi }
        - name: trace
          emptyDir: {}
