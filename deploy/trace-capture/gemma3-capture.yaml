# Real-engine trace capture for gemma-3-27b (image-in / text-out multimodal).
#
# Swapped in after gemma-4 produced gibberish image output (open upstream bug
# vllm#40106: gemma-4's use_bidirectional_attention="vision" is silently ignored).
# gemma-3 multimodal is the mature, correct path on vLLM, so its image->text
# output is coherent. Everything else mirrors gemma4-capture.yaml.
#
#   loadgen / curl (port-forward :8000)
#       | HTTP   chat/completions with inline-base64 image_url content
#   frontend   vllm serve --data-parallel-size-local 0   (PYTHON, on GPU)  :5570
#       | ZMQ
#   tap        inference-sim-tap                          :5570 <-> :5580, trace -> /trace
#       | ZMQ
#   engine     vllm serve --headless                      gemma-3-27b, 1x H200
#
# WHY THESE VERSIONS:
#   - Engine + frontend pinned to vLLM main 16e91176. Its registry maps
#     Gemma3ForConditionalGeneration -> gemma3_mm (mature since early 2025), so NO
#     newer rev needed.
#   - Tap reused at the SAME protocol rev (tap-16e91176-mmfix); protocol crate
#     unchanged, so NO TAP REBUILD.
#   - RedHatAI/gemma-3-27b-it-FP8-dynamic is UNGATED, anonymous CDN pull (dodges
#     the namespace's expired hf-token-secret). FP8 native on H200. Dense 27B,
#     image+text only (no audio), mm_tokens_per_image=256.
#
# Ops (same as gemma4): handshake once in order; if any container restarts, DELETE
# the pod. Idle GPU pods reaped ~35 min. Requests MUST set max_tokens explicitly
# (engine predates #45417). Fetch the trace before scaling down (emptyDir).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-capture-gemma3
  namespace: weaton-dev
  labels:
    llm-d.ai/guide: trace-capture
    llm-d.ai/model: gemma-3-27b
spec:
  replicas: 1 # scale to 0 when not capturing (re-applying resets scale)
  selector:
    matchLabels:
      llm-d.ai/guide: trace-capture-g3
  strategy:
    type: Recreate # never two pods fighting over the GPU
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture-g3
        llm-d.ai/model: gemma-3-27b
    spec:
      serviceAccountName: modelexpress-p2p-nvidia-gpu-vllm-sa
      containers:
        # --- Real engine: headless gemma-3-27b at the protocol-pinned commit ------
        - name: engine
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
          command: ["vllm", "serve"]
          args:
            - RedHatAI/gemma-3-27b-it-FP8-dynamic
            - --headless
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5580
            - --data-parallel-size=1
            - --tensor-parallel-size=1
            - --trust-remote-code
            - --gpu-memory-utilization=0.85
            - --max-model-len=16384
            - --enforce-eager                # skip torch.compile; only need a few requests
            - --generation-config=vllm       # ignore checkpoint generation defaults
            - '--limit-mm-per-prompt={"image": 2}'   # image+text model (no audio/video)
          env:
            - { name: HF_HUB_CACHE, value: /models }
            - { name: HF_HUB_DISABLE_XET, value: "1" }         # xet crawls behind istio egress
            - { name: VLLM_RPC_TIMEOUT, value: "7200000" }
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 96Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache, name: torch-compile-cache }
            - { mountPath: /.triton, name: triton-cache }
            - { mountPath: /.config, name: vllm-config }
            - { mountPath: /models, name: model-cache }
        # --- Recording tap: serde-default + drain-task + observe>=2-frame mmfix ----
        - name: tap
          image: quay.io/wseaton/mock-engine-nixl:tap-16e91176-mmfix
          command: ["/usr/local/bin/inference-sim-tap"]
          args:
            - --trace-out=/trace/trace.jsonl
            - --model=RedHatAI/gemma-3-27b-it-FP8-dynamic
            - --gpu=H200
            - --tp=1
            - --record-tokens                           # content-identical replay
            - --step-stats-out=/trace/step-stats.jsonl  # per-token ITL (autoregressive)
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        # --- Python frontend: OpenAI server, no local engine (api-server only) ------
        - name: frontend
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
          command: ["vllm", "serve"]
          args:
            - RedHatAI/gemma-3-27b-it-FP8-dynamic
            - --data-parallel-size=1
            - --data-parallel-size-local=0
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5570
            - --host=0.0.0.0
            - --port=8000
            - --max-model-len=16384
            - --trust-remote-code
            - --generation-config=vllm
            - '--limit-mm-per-prompt={"image": 2}'
          env:
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }  # engine startup includes weight download
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: HF_HUB_CACHE, value: /models-fe }  # frontend's own tokenizer/config cache
          ports:
            - { name: modelserver, containerPort: 8000, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/models, port: modelserver }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"   # platform init only; dpl=0 does no inference
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /models-fe, name: fe-models }
            - { mountPath: /.cache, name: fe-cache }
            - { mountPath: /.triton, name: fe-triton }
            - { mountPath: /.config, name: fe-config }
      volumes:
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: model-cache
          persistentVolumeClaim:
            claimName: gemma3-model-cache   # persists weights across redeploys
        - name: trace
          emptyDir: {}
        - name: fe-models
          emptyDir: {}
        - name: fe-cache
          emptyDir: {}
        - name: fe-triton
          emptyDir: {}
        - name: fe-config
          emptyDir: {}
