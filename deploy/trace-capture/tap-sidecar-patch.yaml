# Kustomize patch: inject vllm-vcr record tap between frontend (:5570) and engine (:5580).
# Target YOUR-MODELSERVER in your kustomization patches list. Delete pod if any container restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: YOUR-MODELSERVER # match your deployment
spec:
  template:
    spec:
      containers:
        - name: tap
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v8
          command: ["/usr/local/bin/vllm-vcr", "record"]
          # Addresses default to the sidecar convention: frontend handshake
          # tcp://127.0.0.1:5570, engine handshake tcp://127.0.0.1:5580 (plus
          # tap-bound :29560/:29561 data sockets). Override with
          # --frontend-handshake / --engine-handshake / --input-address /
          # --output-address if your pod uses different ports.
          args:
            - --trace-out=/trace/trace.jsonl # .gz to compress
            - --model=YOUR/MODEL
            # - --gpu=H200
            # - --tp=1
            # opt-in content capture (output_token_ids; carries user/model content)
            # - --record-tokens
            # opt-in per-step SchedulerStats sidecar (one line per token-step).
            # Required to capture speculative decoding's spec_decoding_stats
            # (per-position acceptance) when the engine restated below runs with
            # --speculative-config.
            # - --step-stats-out=/trace/step-stats.jsonl
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        # Restate the engine container with its rpc port moved to the tap.
        # Strategic merge matches containers by name and REPLACES args lists,
        # so copy your real args here and change only the port:
        # - name: engine
        #   args:
        #     - YOUR-MODEL
        #     - --headless
        #     - --data-parallel-address=127.0.0.1
        #     - --data-parallel-rpc-port=5580   # was 5570 (the frontend); now the tap
        #     - ...the rest of your existing args, unchanged
        #     # For a speculative-decoding capture, add a spec config and enable
        #     # the tap's --step-stats-out above, e.g. (ngram needs no draft model):
        #     - --speculative-config={"method":"ngram","num_speculative_tokens":4,"prompt_lookup_max":4,"prompt_lookup_min":2}
      volumes:
        - name: trace
          emptyDir: {}
