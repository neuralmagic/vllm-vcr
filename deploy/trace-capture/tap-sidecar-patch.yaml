# Kustomize strategic-merge patch: inject the recording tap into an existing
# disaggregated vLLM pod (a `vllm-rs serve` frontend + a `vllm serve --headless`
# engine in one pod). Reference it from your kustomization.yaml:
#
#   patches:
#     - path: tap-sidecar-patch.yaml
#       target: { kind: Deployment, name: YOUR-MODELSERVER }
#
# The tap sits on the frontend<->engine ZMQ boundary, so the patch does three
# things:
#   1. adds the tap container (binds :5580 for the engine, dials the frontend
#      on :5570, writes the trace to an emptyDir);
#   2. REQUIRES the engine to connect to the tap instead of the frontend:
#      strategic merge replaces scalar lists wholesale, so restate your
#      engine's full args with `--data-parallel-rpc-port=5580` (the tap's
#      --engine-handshake port). The frontend keeps binding :5570.
#   3. adds the trace volume.
#
# Caveats (see README.md): the engine image must match the protocol commit the
# tap was built against; the three processes handshake once, in order, so
# delete the pod if any container restarts; aborts are not recorded.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: YOUR-MODELSERVER # match your deployment
spec:
  template:
    spec:
      containers:
        - name: tap
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v5
          command: ["/usr/local/bin/inference-sim-tap"]
          # Addresses default to the sidecar convention: frontend handshake
          # tcp://127.0.0.1:5570, engine handshake tcp://127.0.0.1:5580 (plus
          # tap-bound :29560/:29561 data sockets). Override with
          # --frontend-handshake / --engine-handshake / --input-address /
          # --output-address if your pod uses different ports.
          args:
            - --trace-out=/trace/trace.jsonl # .gz to compress
            - --model=YOUR/MODEL
            # - --gpu=H200
            # - --tp=1
            # opt-in content capture (output_token_ids; carries user/model content)
            # - --record-tokens
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        # Restate the engine container with its rpc port moved to the tap.
        # Strategic merge matches containers by name and REPLACES args lists,
        # so copy your real args here and change only the port:
        # - name: engine
        #   args:
        #     - YOUR-MODEL
        #     - --headless
        #     - --data-parallel-address=127.0.0.1
        #     - --data-parallel-rpc-port=5580   # was 5570 (the frontend); now the tap
        #     - ...the rest of your existing args, unchanged
      volumes:
        - name: trace
          emptyDir: {}
