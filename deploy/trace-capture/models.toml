# Conformance capture matrix for gen-capture-jobs.py (one Kueue Job per [[capture]]).
# Targets run via conformance-queue (one GPU at a time). Upload + register: docs/conformance.md.
#
# Each [[capture]] inherits [defaults] and [lines.<vllm_tag>] for engine/tap images.
# scenario: baseline | nocache | specdecode | multimodal

[defaults]
namespace = "inference-sim"
queue = "conformance-queue"
gpu = "H200"
gpu_memory_utilization = 0.90
tp = 1
block_size = 16
max_num_seqs = 256
max_model_len = 16384
enforce_eager = true
engine_cpu_request = "8"
engine_cpu_limit = "16"
engine_memory_request = "64Gi"
engine_memory_limit = "96Gi"
model_cache_size = "100Gi"

[lines."v0.23.0"]
engine_image = "docker.io/vllm/vllm-openai:v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f"
tap_image = "ghcr.io/neuralmagic/vllm-vcr:vllm0.23"

[lines."nightly"]
engine_image = "public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:8dd1b702f27edeed24a4336f531b01c346e04253"
tap_image = "ghcr.io/neuralmagic/vllm-vcr:vllmnightly"

[[capture]]
name = "nightly-qwen3-8b-mt-s7"
model = "Qwen/Qwen3-8B"
vllm_tag = "nightly"
scenario = "baseline"
phases = "multiturn"
mt_seed = "7"

[[capture]]
