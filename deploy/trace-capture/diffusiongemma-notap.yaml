apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-capture-dg-notap
  namespace: weaton-dev
  labels:
    llm-d.ai/guide: trace-capture-dgnotap
    llm-d.ai/model: diffusiongemma-26B-A4B
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/guide: trace-capture-dgnotap
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture-dgnotap
        llm-d.ai/model: diffusiongemma-26B-A4B
    spec:
      serviceAccountName: modelexpress-p2p-nvidia-gpu-vllm-sa
      containers:
      - name: engine
        image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
        command:
        - vllm
        - serve
        args:
        - RedHatAI/diffusiongemma-26B-A4B-it-FP8-dynamic
        - --headless
        - --data-parallel-address=127.0.0.1
        - --data-parallel-rpc-port=5570
        - --data-parallel-size=1
        - --tensor-parallel-size=1
        - --trust-remote-code
        - --gpu-memory-utilization=0.85
        - --max-model-len=16384
        - --max-num-seqs=4
        - --enforce-eager
        - --generation-config=vllm
        - '--diffusion-config={"canvas_length": 256}'
        - '--limit-mm-per-prompt={"image": 7}'
        - '--mm-processor-kwargs={"max_soft_tokens": 1120}'
        - --hf-overrides={"diffusion_sampler":"entropy_bound","diffusion_entropy_bound":0.1}
        env:
        - name: VLLM_USE_V2_MODEL_RUNNER
          value: '1'
        - name: HF_HUB_CACHE
          value: /models
        - name: HF_HUB_DISABLE_XET
          value: '1'
        - name: VLLM_RPC_TIMEOUT
          value: '7200000'
        resources:
          requests:
            cpu: '8'
            memory: 64Gi
            nvidia.com/gpu: '1'
          limits:
            cpu: '16'
            memory: 96Gi
            nvidia.com/gpu: '1'
        volumeMounts:
        - mountPath: /dev/shm
          name: shm
        - mountPath: /.cache
          name: torch-compile-cache
        - mountPath: /.triton
          name: triton-cache
        - mountPath: /.config
          name: vllm-config
        - mountPath: /models
          name: model-cache
      - name: frontend
        image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
        command:
        - vllm
        - serve
        args:
        - RedHatAI/diffusiongemma-26B-A4B-it-FP8-dynamic
        - --data-parallel-size=1
        - --data-parallel-size-local=0
        - --data-parallel-address=127.0.0.1
        - --data-parallel-rpc-port=5570
        - --host=0.0.0.0
        - --port=8000
        - --max-model-len=16384
        - --trust-remote-code
        - --generation-config=vllm
        - '--diffusion-config={"canvas_length": 256}'
        - '--limit-mm-per-prompt={"image": 7}'
        - '--mm-processor-kwargs={"max_soft_tokens": 1120}'
        - --hf-overrides={"diffusion_sampler":"entropy_bound","diffusion_entropy_bound":0.1}
        - --default-chat-template-kwargs={"enable_thinking":true}
        env:
        - name: VLLM_ENGINE_READY_TIMEOUT_S
          value: '3600'
        - name: HF_HUB_DISABLE_XET
          value: '1'
        - name: HF_HUB_CACHE
          value: /models-fe
        - name: VLLM_USE_V2_MODEL_RUNNER
          value: '1'
        ports:
        - name: modelserver
          containerPort: 8000
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /v1/models
            port: modelserver
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: '4'
            memory: 8Gi
            nvidia.com/gpu: '1'
          limits:
            cpu: '8'
            memory: 16Gi
            nvidia.com/gpu: '1'
        volumeMounts:
        - mountPath: /models-fe
          name: fe-models
        - mountPath: /.cache
          name: fe-cache
        - mountPath: /.triton
          name: fe-triton
        - mountPath: /.config
          name: fe-config
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
      - name: torch-compile-cache
        emptyDir: {}
      - name: triton-cache
        emptyDir: {}
      - name: vllm-config
        emptyDir: {}
      - name: model-cache
        persistentVolumeClaim:
          claimName: dg-model-cache
      - name: fe-models
        emptyDir: {}
      - name: fe-cache
        emptyDir: {}
      - name: fe-triton
        emptyDir: {}
      - name: fe-config
        emptyDir: {}
