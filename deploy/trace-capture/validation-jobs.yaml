# Counterfactual-validation captures as Kueue-admitted Jobs.
#
# Two self-contained Jobs, queued on weaton-dev's conformance-queue (a dedicated
# ClusterQueue with gpu-h200 nominalQuota: 1, see conformance-queue.yaml). Each pod
# runs the capture stack as sidecars (engine, tap, frontend) and the load generator
# as the main container, so Kueue holds the Job until GPU quota admits it and
# releases the GPU the moment the capture completes. The queue's single GPU of quota
# serializes the two Jobs: only ONE runs at a time, the other waits pending admission
# (capture hygiene: one workload per pod lifetime, no cross-capture interference).
# Apply conformance-queue.yaml once before submitting these.
#
#   trace-validation-cached    prefix cache ON: prompt-length sweep (fits the
#                              latency model's long-prefill buckets) + the
#                              agentic multiturn scenario
#   trace-validation-nocache   engine started with --no-enable-prefix-caching,
#                              same multiturn workload: the real counterfactual
#
# Workflow (wrapped by the justfile):
#   kubectl create configmap validation-scripts -n weaton-dev \
#       --from-file=loadgen.py --from-file=runner.sh=validation-runner.sh \
#       --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f validation-jobs.yaml
#   ... wait for "waiting for fetch" in the loadgen logs ...
#   kubectl exec <pod> -c loadgen -- cat /trace/trace.jsonl > tap-trace.jsonl
#   kubectl exec <pod> -c loadgen -- touch /trace/fetched   # lets the Job complete
#
# The loadgen container self-terminates after 2h if never fetched, so an
# abandoned run cannot squat on the GPU.
apiVersion: batch/v1
kind: Job
metadata:
  name: trace-validation-cached
  namespace: weaton-dev
  labels:
    kueue.x-k8s.io/queue-name: conformance-queue
    llm-d.ai/guide: trace-capture
spec:
  suspend: true # Kueue unsuspends on admission
  backoffLimit: 0
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture
        llm-d.ai/model: Qwen3-8B
    spec:
      restartPolicy: Never
      serviceAccountName: modelexpress-p2p-nvidia-gpu-vllm-sa
      # The capture stack runs as sidecars: started in order (engine binds the
      # GPU and dials the tap's handshake; the tap then dials the frontend),
      # torn down automatically when the loadgen container exits.
      initContainers:
        - name: engine
          restartPolicy: Always
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:ba94a3b9989666f950e1f784d18f2033c63c6cad
          command: ["vllm", "serve"]
          args:
            - Qwen/Qwen3-8B
            - --headless
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5580
            - --data-parallel-size=1
            - --tensor-parallel-size=1
            - --gpu-memory-utilization=0.90
            - --max-model-len=16384
            - --enforce-eager
          # No HF_TOKEN on purpose: Qwen3-8B is ungated and anonymous pulls run
          # at full CDN speed, while the namespace's hf-token-secret is expired.
          # Xet stays off: ~20MB/min through the istio egress vs ~350MB/s plain.
          env:
            - { name: HF_HUB_CACHE, value: /models }
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: VLLM_RPC_TIMEOUT, value: "7200000" }
          resources:
            requests:
              cpu: "8"
              memory: 64Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 96Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache, name: torch-compile-cache }
            - { mountPath: /.triton, name: triton-cache }
            - { mountPath: /.config, name: vllm-config }
            - { mountPath: /models, name: model-cache }
        - name: tap
          restartPolicy: Always
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v3
          command: ["/usr/local/bin/inference-sim-tap"]
          args:
            - --frontend-handshake=tcp://127.0.0.1:5570
            - --engine-handshake=tcp://127.0.0.1:5580
            - --input-address=tcp://127.0.0.1:29560
            - --output-address=tcp://127.0.0.1:29561
            - --trace-out=/trace/trace.jsonl
            - --model=Qwen/Qwen3-8B
            - --gpu=H200
            - --tp=1
            - --block-size=16
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        - name: frontend
          restartPolicy: Always
          image: quay.io/wseaton/mock-engine-nixl:trace-capture-v3
          command: ["/usr/local/bin/vllm-rs", "serve"]
          args:
            - Qwen/Qwen3-8B
            - --data-parallel-size=1
            - --data-parallel-size-local=0
            - --handshake-port=5570
            - --host=0.0.0.0
            - --port=8000
          env:
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }
          resources:
            requests: { cpu: "4", memory: 8Gi }
            limits: { cpu: "8", memory: 16Gi }
      containers:
        - name: loadgen
          image: python:3.12-slim
          command: ["bash", "/scripts/runner.sh"]
          env:
            - { name: PHASES, value: "sweep multiturn" }
          resources:
            requests: { cpu: "2", memory: 2Gi }
            limits: { cpu: "4", memory: 4Gi }
          volumeMounts:
            - { mountPath: /scripts, name: scripts }
            - { mountPath: /trace, name: trace }
      volumes:
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: model-cache
          emptyDir: { sizeLimit: 100Gi }
        - name: trace
          emptyDir: {}
        - name: scripts
          configMap: { name: validation-scripts }
---
