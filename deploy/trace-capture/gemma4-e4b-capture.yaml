# Real-engine trace capture for gemma-4-E4B (image-in / text-out multimodal).
#
# E4B is the SAME arch as the 26B (Gemma4ForConditionalGeneration -> gemma4_mm),
# but it does NOT carry text_config.use_bidirectional_attention="vision", so it is
# NOT subject to the #40106 vision-attention bug that made the 26B output gibberish.
# It is a dense ~4B-effective omni model (audio+vision+video tokens), so it pulls
# and loads fast. Everything else mirrors gemma4-capture.yaml.
#
#   loadgen / curl (port-forward :8000)
#       | HTTP   chat/completions with inline-base64 image_url content
#   frontend   vllm serve --data-parallel-size-local 0   (PYTHON, on GPU)  :5570
#       | ZMQ
#   tap        inference-sim-tap                          :5570 <-> :5580, trace -> /trace
#       | ZMQ
#   engine     vllm serve --headless                      gemma-4-E4B, 1x H200
#
# WHY THESE VERSIONS:
#   - Engine + frontend pinned to vLLM main 16e91176; its registry maps the gemma4
#     arch to gemma4_mm, so NO newer rev needed.
#   - Tap reused at the same protocol rev (tap-16e91176-mmfix); NO TAP REBUILD.
#   - google/gemma-4-E4B-it config + weights are anonymously accessible (gated:none),
#     so no HF_TOKEN (the namespace hf-token-secret is expired anyway). vision
#     soft-tokens=280, image_token_id=258880.
#
# Ops: handshake once in order; if any container restarts, DELETE the pod. Idle GPU
# pods reaped ~35 min. Requests MUST set max_tokens explicitly (engine predates
# #45417). Fetch the trace before scaling down (emptyDir).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-capture-gemma4-e4b
  namespace: weaton-dev
  labels:
    llm-d.ai/guide: trace-capture
    llm-d.ai/model: gemma-4-E4B
spec:
  replicas: 1 # scale to 0 when not capturing (re-applying resets scale)
  selector:
    matchLabels:
      llm-d.ai/guide: trace-capture-g4e4b
  strategy:
    type: Recreate # never two pods fighting over the GPU
  template:
    metadata:
      labels:
        llm-d.ai/guide: trace-capture-g4e4b
        llm-d.ai/model: gemma-4-E4B
    spec:
      serviceAccountName: modelexpress-p2p-nvidia-gpu-vllm-sa
      containers:
        # --- Real engine: headless gemma-4-E4B at the protocol-pinned commit ------
        - name: engine
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
          command: ["vllm", "serve"]
          args:
            - google/gemma-4-E4B-it
            - --headless
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5580
            - --data-parallel-size=1
            - --tensor-parallel-size=1
            - --trust-remote-code
            - --gpu-memory-utilization=0.85
            - --max-model-len=16384
            - --enforce-eager                # skip torch.compile; only need a few requests
            - --generation-config=vllm       # ignore checkpoint generation defaults
            - '--limit-mm-per-prompt={"image": 2, "audio": 0, "video": 0}'  # image-only; cap omni profiling
          env:
            - { name: HF_HUB_CACHE, value: /models }
            - { name: HF_HUB_DISABLE_XET, value: "1" }         # xet crawls behind istio egress
            - { name: VLLM_RPC_TIMEOUT, value: "7200000" }
          resources:
            requests:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /dev/shm, name: shm }
            - { mountPath: /.cache, name: torch-compile-cache }
            - { mountPath: /.triton, name: triton-cache }
            - { mountPath: /.config, name: vllm-config }
            - { mountPath: /models, name: model-cache }
        # --- Recording tap: serde-default + drain-task + observe>=2-frame mmfix ----
        - name: tap
          image: quay.io/wseaton/mock-engine-nixl:tap-16e91176-mmfix
          command: ["/usr/local/bin/inference-sim-tap"]
          args:
            - --trace-out=/trace/trace.jsonl
            - --model=google/gemma-4-E4B-it
            - --gpu=H200
            - --tp=1
            - --record-tokens                           # content-identical replay
            - --step-stats-out=/trace/step-stats.jsonl  # per-token ITL (autoregressive)
          env:
            - { name: RUST_LOG, value: info }
          resources:
            requests: { cpu: "2", memory: 1Gi }
            limits: { cpu: "4", memory: 2Gi }
          volumeMounts:
            - { mountPath: /trace, name: trace }
        # --- Python frontend: OpenAI server, no local engine (api-server only) ------
        - name: frontend
          image: public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo:16e91176cf77bf0f40ae48da22365a5e21b517af
          command: ["vllm", "serve"]
          args:
            - google/gemma-4-E4B-it
            - --data-parallel-size=1
            - --data-parallel-size-local=0
            - --data-parallel-address=127.0.0.1
            - --data-parallel-rpc-port=5570
            - --host=0.0.0.0
            - --port=8000
            - --max-model-len=16384
            - --trust-remote-code
            - --generation-config=vllm
            - '--limit-mm-per-prompt={"image": 2, "audio": 0, "video": 0}'
          env:
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: HF_HUB_CACHE, value: /models-fe }
          ports:
            - { name: modelserver, containerPort: 8000, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v1/models, port: modelserver }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"   # platform init only; dpl=0 does no inference
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /models-fe, name: fe-models }
            - { mountPath: /.cache, name: fe-cache }
            - { mountPath: /.triton, name: fe-triton }
            - { mountPath: /.config, name: fe-config }
      volumes:
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        - name: model-cache
          persistentVolumeClaim:
            claimName: gemma4-e4b-model-cache   # persists weights across redeploys
        - name: trace
          emptyDir: {}
        - name: fe-models
          emptyDir: {}
        - name: fe-cache
          emptyDir: {}
        - name: fe-triton
          emptyDir: {}
        - name: fe-config
          emptyDir: {}
