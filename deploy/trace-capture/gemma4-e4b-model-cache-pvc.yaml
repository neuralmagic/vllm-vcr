# RWX cache for gemma-4-E4B-it weights (~small, ~4B effective), so redeploys skip
# the pull. Same storage class as the other capture caches.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gemma4-e4b-model-cache
  namespace: weaton-dev
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: shared-vast
  resources:
    requests:
      storage: 60Gi
