# Prefill + decode Deployments and shared ServiceAccount for llm-d P/D mock stack.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  - prefill-deployment.yaml
  - decode-deployment.yaml

# Bump image tag here without editing the Deployments.
images:
  - name: ghcr.io/neuralmagic/vllm-vcr
    newTag: vllm0.23
