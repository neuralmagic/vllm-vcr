# Prefill pods (x2): process prompt, register fake KV, expose it on NIXL (:5600) for decode.
# No sidecar. Same vllm-vcr image as decode; MOCK_PD_ROLE=prefill.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-pd-prefill
  labels:
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/model: qwen3-0-6b
    llm-d.ai/role: prefill
spec:
  replicas: 2
  selector:
    matchLabels:
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/model: qwen3-0-6b
      llm-d.ai/role: prefill
  template:
    metadata:
      labels:
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/model: qwen3-0-6b
        llm-d.ai/role: prefill
    spec:
      serviceAccountName: mock-pd-sa
      containers:
        - name: modelserver
          image: ghcr.io/neuralmagic/vllm-vcr:vllm0.23
          imagePullPolicy: Always
          env:
            - name: MODEL
              value: Qwen/Qwen3-0.6B
            - name: MOCK_PD_ROLE
              value: prefill
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Simulated latency (ms): prefill overhead + per-token, then ITL.
            - name: MOCK_PREFILL_OVERHEAD_MS
              value: "30"
            - name: MOCK_PREFILL_TIME_PER_TOKEN_MS
              value: "1"
            - name: MOCK_PREFILL_TIME_STDDEV_MS
              value: "5"
            - name: MOCK_ITL_MS
              value: "8"
            - name: MOCK_ITL_STDDEV_MS
              value: "2"
            - name: MOCK_TIME_FACTOR_UNDER_LOAD
              value: "1.5"
            - name: MOCK_MAX_NUM_SEQS
              value: "5"
          ports:
            - name: modelserver
              containerPort: 8000
              protocol: TCP
            - name: nixl
              containerPort: 5600
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 4Gi
