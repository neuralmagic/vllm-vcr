# Decode pod: llm-d routing sidecar (:8000) → vllm-rs + mock engine (:8200).
# MOCK_PD_ROLE=decode pulls KV from prefill over NIXL (:5600). Same vllm-vcr image as prefill.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-pd-decode
  labels:
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/model: qwen3-0-6b
    llm-d.ai/role: decode
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/model: qwen3-0-6b
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/model: qwen3-0-6b
        llm-d.ai/role: decode
    spec:
      serviceAccountName: mock-pd-sa
      # Sidecar: router traffic on :8000, NIXL V2 P/D handshake, forwards to :8200.
      initContainers:
        - name: routing-proxy
          image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
          restartPolicy: Always
          args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-log-level=1
            - --secure-proxy=false
          ports:
            - name: sidecar
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: modelserver
          image: ghcr.io/neuralmagic/vllm-vcr:vllm0.23
          imagePullPolicy: Always
          env:
            - name: MODEL
              value: Qwen/Qwen3-0.6B
            - name: MOCK_PD_ROLE
              value: decode
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Simulated latency (ms): KV transfer = TTFT, then ITL per token.
            - name: MOCK_KV_TRANSFER_TIME_PER_TOKEN_MS
              value: "1"
            - name: MOCK_KV_TRANSFER_TIME_STDDEV_MS
              value: "1"
            - name: MOCK_ITL_MS
              value: "10"
            - name: MOCK_ITL_STDDEV_MS
              value: "3"
            - name: MOCK_TIME_FACTOR_UNDER_LOAD
              value: "1.5"
            - name: MOCK_MAX_NUM_SEQS
              value: "5"
          ports:
            - name: modelserver
              containerPort: 8200
              protocol: TCP
            - name: nixl
              containerPort: 5600
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 4Gi
