# Decode instances. Same image as prefill but MOCK_PD_ROLE=decode, with the real
# llm-d routing sidecar in front (native sidecar initContainer): sidecar :8000 ->
# vllm-rs :8200. The sidecar drives the NIXL V2 P/D handshake; our engine plays the
# NixlConnector role and pulls KV from the chosen prefill over NIXL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-pd-decode
  labels:
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/model: qwen3-0-6b
    llm-d.ai/role: decode
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/model: qwen3-0-6b
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/model: qwen3-0-6b
        llm-d.ai/role: decode
    spec:
      serviceAccountName: mock-pd-sa
      initContainers:
        - name: routing-proxy
          image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
          restartPolicy: Always # native sidecar
          args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-log-level=1
            - --secure-proxy=false
          ports:
            - name: sidecar
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: modelserver
          image: quay.io/wseaton/mock-engine-nixl:dev
          env:
            - name: MODEL
              value: Qwen/Qwen3-0.6B
            - name: MOCK_PD_ROLE
              value: decode
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: modelserver
              containerPort: 8200
              protocol: TCP
            - name: nixl
              containerPort: 5600
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 4Gi
