# GPU-free llm-d prefill/decode stack (vllm-vcr mock engines + NIXL on CPU).
# Prereqs: see deploy/llm-d-pd/README.md. Deploy: helmfile -f deploy/llm-d-pd/helmfile.yaml apply

releases:
  # llm-d Router (EPP + Envoy); selects pods labeled pd-disaggregation.
  - name: pd-disaggregation
    namespace: llm-d-pd-mock
    chart: oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev
    version: v0
    values:
      - router/base.values.yaml
      - router/pd-disaggregation.values.yaml

  # Mock prefill + decode Deployments (kustomize).
  - name: mock-modelservers
    namespace: llm-d-pd-mock
    chart: ./modelserver
    needs:
      - pd-disaggregation
