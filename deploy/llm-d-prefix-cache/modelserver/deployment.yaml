# Monolithic mock pods (x3): EPP routes by prefix-cache locality via KV events on :5556.
# MOCK_PD_ROLE=both (no P/D). Topic kv@<POD_IP>:8000@<model> must match EPP config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-prefix-cache
  labels:
    llm-d.ai/guide: precise-prefix-cache-routing
    llm-d.ai/model: qwen3-0-6b
spec:
  replicas: 3
  selector:
    matchLabels:
      llm-d.ai/guide: precise-prefix-cache-routing
      llm-d.ai/model: qwen3-0-6b
  template:
    metadata:
      labels:
        llm-d.ai/guide: precise-prefix-cache-routing
        llm-d.ai/model: qwen3-0-6b
        # kv-cache-manager pod reconciler discovers pods with this label.
        llm-d.ai/inference-serving: "true"
    spec:
      serviceAccountName: mock-pc-sa
      containers:
        - name: modelserver
          image: ghcr.io/neuralmagic/vllm-vcr:vllm0.23
          imagePullPolicy: Always
          env:
            - name: MODEL
              value: Qwen/Qwen3-0.6B
            - name: MOCK_PD_ROLE
              value: both
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # KV-cache events (ZMQ PUB on :5556).
            - name: MOCK_ENABLE_KV_EVENTS
              value: "1"
            - name: MOCK_KV_EVENTS_ENDPOINT
              value: "tcp://*:5556"
            - name: MOCK_KV_EVENTS_TOPIC
              value: "kv@$(POD_IP):8000@Qwen/Qwen3-0.6B"
            # blockSize must match EPP tokenProcessorConfig.blockSize (64).
            - name: MOCK_TOKENS_PER_BLOCK
              value: "64"
            - name: MOCK_KV_CACHE_SIZE
              value: "2048"
            # Simulated latency (ms).
            - name: MOCK_PREFILL_OVERHEAD_MS
              value: "30"
            - name: MOCK_PREFILL_TIME_PER_TOKEN_MS
              value: "1"
            - name: MOCK_ITL_MS
              value: "8"
            - name: MOCK_ITL_STDDEV_MS
              value: "2"
            - name: MOCK_TIME_FACTOR_UNDER_LOAD
              value: "1.5"
            - name: MOCK_MAX_NUM_SEQS
              value: "16"
          ports:
            - name: modelserver
              containerPort: 8000
              protocol: TCP
            - name: kv-events
              containerPort: 5556
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 4Gi
