# GPU-free llm-d prefix-cache routing (mock pods publish KV events; EPP routes by prefix).
# Prereqs: see deploy/llm-d-prefix-cache/README.md. Deploy: helmfile -f deploy/llm-d-prefix-cache/helmfile.yaml apply

releases:
  # llm-d Router with precise-prefix-cache-producer; selects precise-prefix-cache-routing pods.
  - name: precise-prefix-cache-routing
    namespace: llm-d-pc-mock
    chart: oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev
    version: v0
    values:
      - router/base.values.yaml
      - router/precise-prefix-cache-routing.values.yaml

  # Mock monolithic Deployment (kustomize); KV events on :5556.
  - name: mock-modelservers
    namespace: llm-d-pc-mock
    chart: ./modelserver
    needs:
      - precise-prefix-cache-routing
