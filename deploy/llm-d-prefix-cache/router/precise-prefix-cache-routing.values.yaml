# Prefix-cache routing: EPP indexes KV events from pods (:5556), routes by longest prefix match.
# matchLabels: llm-d.ai/guide=precise-prefix-cache-routing. blockSize 64 must match MOCK_TOKENS_PER_BLOCK.
router:
  tokenizer:
    enabled: true
    modelName: Qwen/Qwen3-0.6B

  epp:
    replicas: 1
    pluginsConfigFile: "precise-prefix-cache-routing-plugins.yaml"
    pluginsCustomConfig:
      precise-prefix-cache-routing-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
          - type: token-producer
            parameters:
              modelName: Qwen/Qwen3-0.6B
              vllm:
                url: "http://localhost:8000"
          - type: endpoint-notification-source
          - type: precise-prefix-cache-producer
            parameters:
              tokenProcessorConfig:
                blockSize: 64
              speculativeIndexing: true
              indexerConfig:
                kvBlockIndexConfig:
                  enableMetrics: true
              kvEventsConfig:
                topicFilter: "kv@"
                concurrency: 8
                discoverPods: true
                podDiscoveryConfig:
                  socketPort: 5556
          - type: prefix-cache-scorer
            parameters:
              prefixMatchInfoProducerName: precise-prefix-cache-producer
          - type: kv-cache-utilization-scorer
          - type: queue-scorer
          - type: no-hit-lru-scorer
        dataLayer:
          sources:
            - pluginRef: endpoint-notification-source
              extractors:
                - pluginRef: precise-prefix-cache-producer
        schedulingProfiles:
          - name: default
            plugins:
              - pluginRef: kv-cache-utilization-scorer
                weight: 2.0
              - pluginRef: queue-scorer
                weight: 2.0
              - pluginRef: prefix-cache-scorer
                weight: 3.0
              - pluginRef: no-hit-lru-scorer
                weight: 2.0

  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  modelServers:
    type: vllm
    targetPorts:
      - number: 8000
    matchLabels:
      llm-d.ai/guide: "precise-prefix-cache-routing"
