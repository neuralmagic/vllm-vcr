# Vendored from llm-d v0.7.0 guides/precise-prefix-cache-routing/router/
# precise-prefix-cache-routing.values.yaml, adapted for the mock model server:
#   - small model (Qwen/Qwen3-0.6B) so the frontend tokenizer is light,
#   - matchLabels point at our mock pods,
#   - single EPP replica (no HA) to keep the GPU-free testbed minimal.
#
# The precise-prefix-cache-producer subscribes to each pod's KV-cache events (the ones our
# mock engine emits on :5556), indexes the prefix blocks by re-hashing token_ids at
# blockSize 64, and prefix-cache-scorer routes to the pod holding the longest match.
router:
  tokenizer:
    enabled: true
    # Must match the deployed model server and the token-producer modelName below.
    modelName: Qwen/Qwen3-0.6B

  epp:
    replicas: 1
    pluginsConfigFile: "precise-prefix-cache-routing-plugins.yaml"
    pluginsCustomConfig:
      precise-prefix-cache-routing-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
          - type: token-producer
            parameters:
              modelName: Qwen/Qwen3-0.6B # Must match router.tokenizer.modelName above
              vllm:
                url: "http://localhost:8000"
          - type: endpoint-notification-source
          - type: precise-prefix-cache-producer
            parameters:
              tokenProcessorConfig:
                # Must match the model server's MOCK_TOKENS_PER_BLOCK (64).
                blockSize: 64
              speculativeIndexing: true
              indexerConfig:
                kvBlockIndexConfig:
                  enableMetrics: true
              kvEventsConfig:
                topicFilter: "kv@"
                concurrency: 8
                discoverPods: true
                podDiscoveryConfig:
                  # Must match the model server's KV-events container port (5556).
                  socketPort: 5556
          - type: prefix-cache-scorer
            parameters:
              prefixMatchInfoProducerName: precise-prefix-cache-producer
          - type: kv-cache-utilization-scorer
          - type: queue-scorer
          - type: no-hit-lru-scorer
        dataLayer:
          sources:
            - pluginRef: endpoint-notification-source
              extractors:
                - pluginRef: precise-prefix-cache-producer
        schedulingProfiles:
          - name: default
            plugins:
              - pluginRef: kv-cache-utilization-scorer
                weight: 2.0
              - pluginRef: queue-scorer
                weight: 2.0
              - pluginRef: prefix-cache-scorer
                weight: 3.0
              - pluginRef: no-hit-lru-scorer
                weight: 2.0

  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  modelServers:
    type: vllm
    targetPorts:
      - number: 8000
    matchLabels:
      llm-d.ai/guide: "precise-prefix-cache-routing"
