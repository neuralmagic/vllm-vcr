# Vendored from llm-d guides/recipes/router/base.values.yaml (llm-d v0.7.0).
# Base values shared by the llm-d Router (EPP + Envoy sidecar). Layered under the
# pd-disaggregation values.
router:
  epp:
    replicas: 1
    image:
      registry: ghcr.io/llm-d
      repository: llm-d-router-endpoint-picker-dev
      tag: main
      pullPolicy: Always
    flags:
      v: 2
    pluginsConfigFile: "default-plugins.yaml"
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        memory: 8Gi

  inferencePool:
    failureMode: "FailOpen"

  modelServers:
    protocol: http

  proxy:
    args:
      - "--service-node"
      - "envoy-sidecar"
      - "--log-level"
      - "warn"
      - "--concurrency"
      - "8"
      - "--drain-strategy"
      - "immediate"
      - "--drain-time-s"
      - "60"
      - "-c"
      - "/etc/envoy/envoy.yaml"
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        memory: 8Gi
